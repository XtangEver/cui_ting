models: [nanyan]

whisper:
  model: medium
  download_root: "D:/models"
  device: cpu
  compute_type: int8
  cpu_threads: 8
  audio_chunk_seconds: 1200
  audio_context_seconds: 15
  vad_filter: true

llm:
  max_tokens: 128000

settings:
  input_file: "input_data.json"
  output_dir: "test_case"
  chunk_size: 20480
  chunk_overlap: 256
  cookies_file: "cookie/bili_cookies.txt"
  subtitle_first: true
  enable_refine: true
