# 启用的模型列表 (详情在 .env 中配置: {NAME}_API_KEY / {NAME}_BASE_URL / {NAME}_MODEL)
models:
  - minimax

# Whisper模型配置
whisper:
  model_path: "/Users/tangxian/work_dir/models/mlx_whisper_medium/"

# 通用设置
settings:
  chunk_size: 20480
  chunk_overlap: 256
  # 可选项：cookie/bili_cookies.txt、cookie/youtube_cookies.txt
  cookies_file: "cookie/bili_cookies.txt"
  # 输入json文件路径
  input_file: "/Users/tangxian/work_dir/cui_ting/input_data.json"
  # 输出路径
  output_dir: "/Users/tangxian/work_dir/cui_ting/test_case"
  subtitle_first: true
  # 是否启用LLM后处理（false=仅下载+转录，true=下载+转录+LLM精炼）
  enable_refine: true
