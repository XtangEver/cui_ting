<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Transcribe - 智能视频转录</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/marked.min.js"></script>
</head>
<body>
    <!-- Login Page -->
    <div id="page-login" class="page" style="display:none;">
        <div class="glow"></div>
        <div class="container">
            <header>
                <h1>Transcribe</h1>
                <p class="subtitle">将 B 站智慧转化为文字力量</p>
            </header>
            <div class="login-form">
                <div class="input-wrapper">
                    <input type="text" id="login-username" placeholder="账号" autocomplete="username">
                </div>
                <div class="input-wrapper">
                    <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
                </div>
                <button class="primary-btn login-btn" id="login-btn">登录</button>
                <div id="login-error" class="error-msg" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- Task List Page -->
    <div id="page-list" class="page" style="display:none;">
        <div class="glow"></div>
        <div class="container">
            <header>
                <div class="header-row">
                    <div>
                        <h1>Transcribe</h1>
                        <p class="subtitle">将 B 站智慧转化为文字力量</p>
                    </div>
                    <button class="logout-btn" id="logout-btn">退出</button>
                </div>
            </header>

            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="url-input" placeholder="粘贴视频链接或输入 BV 号...">
                </div>
                <button class="primary-btn" id="submit-btn">开始转录</button>
                <div class="tags-input-row" id="tags-input-row">
                    <input type="text" id="tags-input" placeholder="标签（逗号分隔，可选）">
                </div>
                <div class="advanced-toggle" id="advanced-toggle" onclick="toggleAdvanced()">
                    <span>高级选项</span>
                    <span class="toggle-arrow">▾</span>
                </div>
                <div class="advanced-options" id="advanced-options" style="display:none;">
                    <div class="option-row">
                        <label for="model-select">模型</label>
                        <select id="model-select">
                            <option value="">默认</option>
                        </select>
                    </div>
                    <div class="option-row" style="margin-top:8px;">
                        <label for="refine-toggle">启用精炼</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="refine-toggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="task-list-wrapper">
                <div class="list-header">
                    <span>近期任务</span>
                    <span id="task-count">0 任务</span>
                </div>
                <div id="task-list"></div>
            </div>
        </div>
        <div id="toast-container"></div>
    </div>

    <!-- Result Page -->
    <div id="page-result" class="page" style="display:none;">
        <div class="glow"></div>
        <div class="container result-container">
            <div class="result-header">
                <button class="back-btn" id="back-btn">&larr; 返回</button>
                <h2 id="result-title">结果</h2>
                <button class="rename-btn" id="result-rename-btn" style="display:none;" onclick="startResultRename()">✎</button>
            </div>
            <div class="result-toolbar" id="result-toolbar">
                <button class="toolbar-btn" onclick="downloadMarkdown()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下载 .md
                </button>
                <button class="toolbar-btn" onclick="copyCurrentText()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    复制全文
                </button>
                <button class="toolbar-btn" id="copy-raw-btn" onclick="copyRawText()" style="display:none;">
                    复制原文
                </button>
            </div>
            <div class="result-tabs">
                <button class="result-tab active" data-tab="refined">精炼文本</button>
                <button class="result-tab" data-tab="raw">原始转录</button>
            </div>
            <div class="result-body">
                <div id="result-content" class="result-content markdown-body"></div>
                <nav id="toc-sidebar" class="toc-sidebar" style="display:none;"></nav>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
